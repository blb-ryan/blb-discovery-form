name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyDxbtbAY7lWb-LXZogm5Ok3JcdQZnPZLZ0
          VITE_FIREBASE_AUTH_DOMAIN: blb-discovery-form.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: blb-discovery-form
          VITE_FIREBASE_STORAGE_BUCKET: blb-discovery-form.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "334070326794"
          VITE_FIREBASE_APP_ID: "1:334070326794:web:5dca6e339e0c53616961f3"
          VITE_API_BASE_URL: https://blb-discovery-form.vercel.app
          VITE_RECAPTCHA_SITE_KEY: 6Lc9Aa0sAAAAAMOfhTxtSixdJKb6VTlDKFU8fq3r
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
